name: Language Guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  english-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check docs are English-oriented
        run: |
          set -euo pipefail
          PATTERN='[谩脿芒茫茅锚铆贸么玫煤莽脕脌脗脙脡脢脥脫脭脮脷脟]|\b(Objetivo|Premissas|Decis茫o|Racional|Problema|Solu莽茫o|Resultados|Pr贸ximo|Estado|Documenta莽茫o|N贸|Camada|mensagens|valida莽茫o|mitiga莽茫o)\b'
          if grep -RInE "$PATTERN" README.md docs; then
            echo "Portuguese markers detected. Please keep project outputs in English."
            exit 1
          fi
          echo "Language guard passed."
