[platformio]
default_envs = wearable_esp32

[env]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
build_flags =
  -D CORE_DEBUG_LEVEL=1

[env:wearable_esp32]
build_src_filter =
  +<wearable/*>
  +<common/*>

[env:environmental_esp32]
build_src_filter =
  +<environmental/*>
  +<common/*>

[env:hub_esp32]
build_src_filter =
  +<hub/*>
  +<common/*>
